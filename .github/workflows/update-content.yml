name: Update Content and Index

on:
  schedule:
    - cron: "0 4 * * 1" # Her Pazartesi 04:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/scraper/requirements.txt
          pip install -r services/indexer/requirements.txt

      - name: Scrape and upsert
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python services/scraper/scrape_and_store.py --to-db

      - name: Rebuild vector index
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python services/indexer/index_articles.py
